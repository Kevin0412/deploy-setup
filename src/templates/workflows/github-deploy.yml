name: Deploy to VPS

on:
  push:
    branches:
      - {{BRANCH_PRODUCTION}}
  workflow_dispatch:

# Serialize deployments targeting the same server — prevents two
# concurrent runs from racing on the remote machine when multiple
# agents/branches push in quick succession. cancel-in-progress: false
# so we queue rather than abort (aborting mid-deploy risks inconsistent
# server state).
concurrency:
  group: deploy-{{APP_NAME}}-${{ secrets.SERVER_HOST }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy source to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "{{DEPLOY_DIR}}/{{APP_NAME}}"
          rm: true
          overwrite: true

      - name: Build and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd {{DEPLOY_DIR}}/{{APP_NAME}}
            # Generate .env
            cat > .env << 'ENVEOF'
{{ENV_HARDCODED_LINES}}
{{ENV_SECRET_LINES}}
            ENVEOF
            sed -i 's/^ *//' .env
{{#IF SKIP_BUILD}}
            # Using existing docker-compose.yml, skip build
            docker compose up -d --remove-orphans
{{/IF}}
{{#IF NOT_SKIP_BUILD}}
            docker compose build
            docker compose up -d --remove-orphans
{{/IF}}
{{#IF DB_MIGRATE_CMD}}
            echo "Running database migration..."
            docker compose exec -T {{APP_NAME}} {{DB_MIGRATE_CMD}}
{{/IF}}
            docker image prune -f

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Waiting for container to start..."
            sleep 10
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:{{APP_PORT}}/ || true)
              if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
                echo "Health check passed (HTTP $STATUS)"
                exit 0
              fi
              echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
              sleep 5
            done
            echo "Health check failed after 5 attempts"
            docker compose ps || true
            docker logs {{APP_NAME}} --tail 20
            exit 1
