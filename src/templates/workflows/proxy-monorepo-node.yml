name: Deploy Monorepo

on:
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Commit SHA to deploy'
        required: true
      repo:
        description: 'Source repo (owner/name)'
        required: true

concurrency:
  group: deploy-{{APP_NAME}}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
    timeout-minutes: {{DEPLOY_TIMEOUT_MINUTES}}

    steps:
      - name: Resolve inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "ref=${{ github.event.client_payload.ref }}" >> $GITHUB_OUTPUT
            echo "repo=${{ github.event.client_payload.repo }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.event.inputs.ref }}" >> $GITHUB_OUTPUT
            echo "repo=${{ github.event.inputs.repo }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.inputs.outputs.repo }}
          ref: ${{ steps.inputs.outputs.ref }}
          token: ${{ secrets.{{CHECKOUT_TOKEN_SECRET}} }}

      - name: Sync source to deploy dir
        run: |
          mkdir -p {{DEPLOY_DIR}}/{{APP_NAME}}
          rsync -a --exclude='.git' --exclude='node_modules' --exclude='_work' \
            ./ {{DEPLOY_DIR}}/{{APP_NAME}}/

      - name: Build apps on host
        run: |
          cd {{DEPLOY_DIR}}/{{APP_NAME}}
          pnpm install --frozen-lockfile
{{#IF SERVER_BUILD_CMD}}
          {{SERVER_BUILD_CMD}}
{{/IF}}
{{#IF ADMIN_BUILD_CMD}}
          {{ADMIN_BUILD_CMD}}
{{/IF}}

      - name: Build and deploy
        env:
{{ENV_PROXY_SECRET_ENV_BLOCK}}
        run: |
          set -e
          cd {{DEPLOY_DIR}}/{{APP_NAME}}

          echo "=== Writing .env ==="
          : > .env
{{ENV_PROXY_WRITE_BLOCK}}

          echo "=== Building images ==="
          docker compose -f {{COMPOSE_FILE}} build

          echo "=== Starting containers ==="
          docker compose -f {{COMPOSE_FILE}} up -d --remove-orphans

{{#IF DB_MIGRATE_CMD}}
          echo "=== Database migration ==="
          {{DB_MIGRATE_CMD}}
{{/IF}}

          echo "=== Cleanup ==="
          docker image prune -f

{{#IF NGINX_SYNC_CMD}}
      - name: Sync nginx config
        run: |
          {{NGINX_SYNC_CMD}}
{{/IF}}

      - name: Health check
        run: |
          echo "Waiting for containers to start..."
          sleep 10
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:{{APP_PORT}}/{{HEALTH_PATH}} || true)
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 5 attempts"
          docker ps --filter name={{APP_NAME}}
          docker logs {{APP_NAME}}-server-1 --tail 30 2>/dev/null || true
          exit 1
